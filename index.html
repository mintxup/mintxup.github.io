<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>mintxup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loader Overlay -->
    <div id="loader-overlay">
        <div id="loader-container">
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="click-to-enter" class="hidden">Click to enter</div>
        </div>
    </div>
    <div id="red-flash"></div>

    <canvas id="bg-canvas"></canvas>
    
    <div class="content">
        <div class="input-wrapper">
            <input type="text" id="nick" class="nick-input" value="mintxup" spellcheck="false" autocomplete="off">
            <span id="nick-sizer" class="input-sizer" aria-hidden="true"></span>
            <span id="nick-cursor" class="cursor-char">|</span>
        </div>
        <div class="links">
            <a href="https://t.me/mintxup" class="link" target="_blank" rel="noopener noreferrer">Telegram</a>
            <a href="https://youtube.com/@mintxup" class="link" target="_blank" rel="noopener noreferrer">Youtube</a>
            <a href="#" id="blog-link" class="link" target="_blank" rel="noopener noreferrer">Blog</a>
        </div>
        <div id="hints-container" aria-live="polite"></div>
    </div>

    <div id="explosion-message">
        <div id="explosion-title"></div>
        <button id="explosion-btn"></button>
    </div>

    <!-- Touch Indicator (visible only on touch devices) -->
    <div id="touch-indicator"></div>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle" aria-label="Toggle Theme">
        <div class="icon-wrapper">
            <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            </svg>
        </div>
    </button>

    <!-- Top Secret Button -->
    <button id="top-secret">Top Secret</button>

    <script src="script.js"></script>
</body>
</html>
